<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laporan Kas</title>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

h3{text-align:center}

.card{
background:white;
padding:12px;
margin:10px;
border-radius:10px;
}

.filter{
display:flex;
gap:8px;
flex-wrap:wrap;
align-items:center;
}

.filter input,.filter select{
padding:6px;
border:1px solid #ccc;
border-radius:6px;
}

.summary{

flex-wrap:wrap;
font-weight:bold;
}

.summary div{font-size:14px;
background:#f1f3f6;
padding:8px 12px;
border-radius:6px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
border:1px solid #ddd;
padding:6px;
text-align:center;
font-size:11px;
}

th{
background:#f1f1f1;
}

.masuk{color:green;font-weight:bold;}
.keluar{color:red;font-weight:bold;}

button{
padding:6px 12px;
border:none;
border-radius:6px;
background:#1e90ff;
color:white;
cursor:pointer;
}
header{
  background: linear-gradient(to right, #1e90ff, #0f3057);
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

.brand-text .subtitle{
  font-size:12px;
  opacity:0.9;
}

.brand-text .title{
  font-size:16px;
  font-weight:bold;
}

</style>
</head>

<body>

<header>
  <div class="brand">
    <img src="img/icon-192.png">
    <div class="brand-text">
      <div class="subtitle">Koperasi</div>
      <div class="title">ARFA DRIVER</div>
    </div>
  </div>
  <button class="btn-primary" onclick="kembali()">Kembali</button>
</header>



<h3>LAPORAN KAS</h3>



<div class="summary">

<div id="saldoCash">Saldo Cash : Rp 0</div>
<div id="saldoBank">Saldo Bank : Rp 0</div>
<div id="saldoTotal">Total Kas : Rp 0</div>

<div>Kas Masuk : Rp <span id="totalMasuk">0</span></div>
<div>Kas Keluar : Rp <span id="totalKeluar">0</span></div>

</div>


<div class="card">

<div class="filter">

<label>Dari</label>
<input type="date" id="tglAwal">

<label>Sampai</label>
<input type="date" id="tglAkhir">

<label>Sumber</label>
<select id="filterSumber">
<option value="semua">Semua</option>
<option value="cash">Cash</option>
<option value="bank">Bank</option>
</select>

<button onclick="filterData()">Filter</button>
<button onclick="resetFilter()">Reset</button>

</div>

</div>

<table>

<thead>
<tr>
<th>Tanggal</th>
<th>Keterangan</th>
<th>Masuk</th>
<th>Keluar</th>
<th>Saldo Cash</th>
<th>Saldo Bank</th>
<th>Sumber</th>
</tr>
</thead>

<tbody id="laporanKas"></tbody>

</table>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
authDomain:"arfa-c7dee.firebaseapp.com",
databaseURL:"https://arfa-c7dee-default-rtdb.firebaseio.com",
projectId:"arfa-c7dee"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const kasRef=ref(db,"kas");

let laporanData=[];

function rp(n){
return Number(n||0).toLocaleString("id-ID");
}

function tgl(t){
const d=new Date(t);
if(isNaN(d)) return "-";
return d.toLocaleDateString("id-ID");
}

onValue(kasRef,(snap)=>{

laporanData=[];

if(snap.exists()){

const data=snap.val();

for(const k in data){

const item=data[k];

laporanData.push({

id:k,
tanggal:item.tanggal ? new Date(item.tanggal) : new Date(),
keterangan:item.keterangan ?? "-",
sumber:(item.sumberKas ?? "cash").toLowerCase(),
masuk:item.tipe==="masuk" ? Number(item.jumlah) : 0,
keluar:item.tipe==="keluar" ? Number(item.jumlah) : 0

});

}

}

tampilkan(laporanData);

});

function tampilkan(data){

const tbody=document.getElementById("laporanKas");
tbody.innerHTML="";

let cash=0;
let bank=0;

let totalMasuk=0;
let totalKeluar=0;

data.sort((a,b)=>a.tanggal-b.tanggal);

data.forEach(i=>{

totalMasuk+=i.masuk;
totalKeluar+=i.keluar;

if(i.sumber==="cash"){
cash+=i.masuk-i.keluar;
}

if(i.sumber==="bank"){
bank+=i.masuk-i.keluar;
}

const tr=document.createElement("tr");

tr.innerHTML=`

<td>${tgl(i.tanggal)}</td>
<td>${i.keterangan}</td>
<td class="masuk">${i.masuk?"Rp "+rp(i.masuk):"-"}</td>
<td class="keluar">${i.keluar?"Rp "+rp(i.keluar):"-"}</td>
<td>Rp ${rp(cash)}</td>
<td>Rp ${rp(bank)}</td>
<td>${i.sumber.toUpperCase()}</td>

`;

tbody.appendChild(tr);

});

document.getElementById("saldoCash").innerText="Saldo Cash : Rp "+rp(cash);
document.getElementById("saldoBank").innerText="Saldo Bank : Rp "+rp(bank);
document.getElementById("saldoTotal").innerText="Total Kas : Rp "+rp(cash+bank);

document.getElementById("totalMasuk").innerText=rp(totalMasuk);
document.getElementById("totalKeluar").innerText=rp(totalKeluar);

}

window.filterData=function(){

const awal=document.getElementById("tglAwal").value;
const akhir=document.getElementById("tglAkhir").value;
const sumber=document.getElementById("filterSumber").value;

let filtered=[...laporanData];

if(awal && akhir){

const a=new Date(awal);
const b=new Date(akhir);

b.setHours(23,59,59,999);

filtered=filtered.filter(i=>{
return i.tanggal>=a && i.tanggal<=b;
});

}

if(sumber!=="semua"){
filtered=filtered.filter(i=>i.sumber===sumber);
}

tampilkan(filtered);

}

window.resetFilter=function(){

document.getElementById("tglAwal").value="";
document.getElementById("tglAkhir").value="";
document.getElementById("filterSumber").value="semua";

tampilkan(laporanData);

}

window.exportPDF=function(){

const { jsPDF } = window.jspdf;

const doc=new jsPDF();

doc.text("KOPERASI ARFA DRIVER",14,15);
doc.text("LAPORAN KAS",14,22);

let rows=[];

document.querySelectorAll("#laporanKas tr").forEach(tr=>{

const td=tr.querySelectorAll("td");

rows.push([
td[0].innerText,
td[1].innerText,
td[2].innerText,
td[3].innerText,
td[4].innerText,
td[5].innerText,
td[6].innerText
]);

});

doc.autoTable({
startY:30,
head:[["Tanggal","Keterangan","Masuk","Keluar","Saldo Cash","Saldo Bank","Sumber"]],
body:rows
});

doc.save("laporan_kas.pdf");

}
window.kembali = function(){
  window.location.href="dashboard.html";
}
</script>

</body>
</html>
