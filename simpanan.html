<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simpanan Anggota</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}

header{
  background: linear-gradient(to right, #1e90ff, #0f3057);
  color:white;
  padding:14px 20px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.brand{
  display:flex;
  align-items:center;
  gap:10px;
}

.brand img{
  width:42px;
  height:42px;
  border-radius:50%;
  object-fit:cover;
}

  .brand-text .subtitle{
  font-size:12px;
  opacity:0.9;
}

.brand-text .title{
  font-size:16px;
  font-weight:bold;
}

.container{
padding:20px;
}

.card{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 3px 10px rgba(0,0,0,.1);
}

.anggota-card{
border-left:5px solid #1e90ff;
padding:12px;
margin-bottom:12px;
border-radius:8px;
background:white;
box-shadow:0 2px 8px rgba(0,0,0,.08);
cursor:pointer;
}

.row{
display:flex;
justify-content:space-between;
margin-bottom:5px;
}

input,select{
width:100%;
padding:8px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:8px 12px;
border:none;
border-radius:6px;
cursor:pointer;
background:#1e90ff;
color:white;
}

.btn-danger{
background:red;
}

.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.4);
justify-content:center;
align-items:center;
}

.modal-content{
background:white;
padding:20px;
width:90%;
max-width:400px;
border-radius:10px;
max-height:80vh;
overflow:auto;
}

.transaksi{
border-top:1px solid #ddd;
padding:8px 0;
}

</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

</head>
<body>
<header>
  <div class="brand">
    <img src="img/icon-192.png">
     <div class="brand-text">
      <div class="subtitle">Koperasi</div>
      <div class="title">ARFA DRIVER</div>
     </div>
    
       <button onclick="window.location='dashboard.html'">Kembali</button>
   <button onclick="exportPDF()">Export PDF</button>
  </div>
  </header>


<div class="container">

<div class="card">
Total Simpanan: Rp <span id="totalSimpanan">0</span>
</div>

<div class="card" id="formTambah">
<h3>Tambah Simpanan</h3>

<select id="anggotaSelect"></select>

<select id="jenis">
<option value="pokok">Simpanan Pokok</option>
<option value="wajib">Simpanan Wajib</option>
<option value="sukarela">Simpanan Sukarela</option>
</select>

<input type="number" id="jumlah" placeholder="Jumlah">

<select id="metode">
<option value="cash">Cash</option>
<option value="bank">Bank</option>
</select>

<input type="text" id="keterangan" placeholder="Keterangan">

<button id="btnSimpan">Simpan</button>
</div>

<div class="card">

<input type="text" id="search" placeholder="Cari anggota...">

<select id="filterAnggota">
<option value="">Semua Anggota</option>
</select>

</div>

<div id="cardContainer"></div>

</div>

<!-- MODAL RIWAYAT -->

<div class="modal" id="modalRiwayat">
<div class="modal-content">

<h3>Riwayat Simpanan</h3>

<div id="listRiwayat"></div>

<button onclick="tutupRiwayat()">Tutup</button>

</div>
</div>

<!-- MODAL EDIT -->

<div class="modal" id="modalEdit">
<div class="modal-content">

<h3>Edit Simpanan</h3>

<input type="hidden" id="editId">
<label>Jenis</label>  
<select id="editJenis">
<option value="pokok">Pokok</option>
<option value="wajib">Wajib</option>
<option value="sukarela">Sukarela</option>
</select>

<label>Jumlah</label>
<input type="number" id="editJumlah">

<label>Keterangan</label>
<input type="text" id="editKet">

<button onclick="updateData()">Update</button>
<button style="background:red" onclick="hapusData()">Hapus</button>
<button onclick="tutupEdit()">Tutup</button>

</div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, push, update, remove }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

  const firebaseConfig = {
  apiKey: "AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
  authDomain: "arfa-c7dee.firebaseapp.com",
  databaseURL: "https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId: "arfa-c7dee",
  storageBucket: "arfa-c7dee.firebasestorage.app",
  messagingSenderId: "468058520812",
  appId: "1:468058520812:web:f9cbc82fe7e88ecda9b9c9"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const anggotaRef = ref(db,"koperasi/anggota");
const simpananRef = ref(db,"koperasi/simpanan");
const kasRef = ref(db,"koperasi/kas");

let semuaTransaksi={};
let rekapGlobal={};

const role=localStorage.getItem("role") || "user";

if(role!=="admin"){
document.getElementById("formTambah").style.display="none";
}

/* LOAD ANGGOTA */

onValue(anggotaRef,snap=>{

const select=document.getElementById("anggotaSelect");
const filter=document.getElementById("filterAnggota");

select.innerHTML="<option value=''>Pilih Anggota</option>";
filter.innerHTML="<option value=''>Semua Anggota</option>";

snap.forEach(child=>{

const nama=child.val().nama;

select.innerHTML+=`<option value="${child.key}">${nama}</option>`;
filter.innerHTML+=`<option value="${nama}">${nama}</option>`;

});

});

/* LOAD SIMPANAN */

onValue(simpananRef,snap=>{

semuaTransaksi={};
rekapGlobal={};

let total=0;

snap.forEach(child=>{

const d=child.val();
const id=child.key;

semuaTransaksi[id]=d;

total+=Number(d.jumlah);

if(!rekapGlobal[d.nama])
rekapGlobal[d.nama]={pokok:0,wajib:0,sukarela:0};

rekapGlobal[d.nama][d.jenis]+=Number(d.jumlah);

});

document.getElementById("totalSimpanan").innerText=
total.toLocaleString("id-ID");

renderCard();

});

/* RENDER CARD */

function renderCard(){

const container=document.getElementById("cardContainer");
container.innerHTML="";

const filter=document.getElementById("filterAnggota").value;
const search=document.getElementById("search").value.toLowerCase();

for(const nama in rekapGlobal){

if(filter && nama!==filter) continue;
if(search && !nama.toLowerCase().includes(search)) continue;

const data=rekapGlobal[nama];

const total=data.pokok+data.wajib+data.sukarela;

const card=document.createElement("div");
card.className="anggota-card";

card.innerHTML=`

<div class="row"><b>${nama}</b></div>

<div class="row">
<span>Pokok</span>
<span>Rp ${data.pokok.toLocaleString("id-ID")}</span>
</div>

<div class="row">
<span>Wajib</span>
<span>Rp ${data.wajib.toLocaleString("id-ID")}</span>
</div>

<div class="row">
<span>Sukarela</span>
<span>Rp ${data.sukarela.toLocaleString("id-ID")}</span>
</div>

<div class="row">
<b>Total</b>
<b>Rp ${total.toLocaleString("id-ID")}</b>
</div>

`;

card.onclick=()=>lihatRiwayat(nama);

container.appendChild(card);

}

}

document.getElementById("filterAnggota").onchange=renderCard;
document.getElementById("search").onkeyup=renderCard;

/* SIMPAN */

document.getElementById("btnSimpan").onclick=async()=>{

const select=document.getElementById("anggotaSelect");

if(!select.value) return alert("Pilih anggota");

const nama=select.options[select.selectedIndex].text;

const jenis=document.getElementById("jenis").value;
const jumlah=Number(document.getElementById("jumlah").value);
const metode=document.getElementById("metode").value;
const ket=document.getElementById("keterangan").value;

const waktu=new Date().toLocaleString("id-ID");

await push(simpananRef,{
anggotaId:select.value,
nama,
jenis,
jumlah,
metode,
keterangan:ket,
tanggal:waktu
});

await push(kasRef,{
jenis:"masuk",
metode,
jumlah,
tanggal:waktu,
keterangan:`Simpanan ${jenis} - ${nama}`
});

document.getElementById("jumlah").value="";
document.getElementById("keterangan").value="";

};

/* RIWAYAT */

window.lihatRiwayat=function(nama){

const list=document.getElementById("listRiwayat");
list.innerHTML="";

for(const id in semuaTransaksi){

const t=semuaTransaksi[id];

if(t.nama===nama){

list.innerHTML+=`

<div class="transaksi">

${t.tanggal}<br>
${t.jenis} - Rp ${Number(t.jumlah).toLocaleString("id-ID")}<br>
${t.keterangan || ""}


${role==="admin" ? `<br><button onclick="editData('${id}')">Edit</button>` : ""}

</div>

`;

}

}

document.getElementById("modalRiwayat").style.display="flex";

};

window.tutupRiwayat=()=>{

document.getElementById("modalRiwayat").style.display="none";

};
  window.editData=function(id){

const d=semuaTransaksi[id]

document.getElementById("editId").value=id
document.getElementById("editJenis").value=d.jenis
document.getElementById("editJumlah").value=d.jumlah
document.getElementById("editKet").value=d.keterangan || ""

document.getElementById("modalEdit").style.display="flex"

}

window.updateData=async function(){

const id=document.getElementById("editId").value

await update(ref(db,"koperasi/simpanan/"+id),{

jenis:document.getElementById("editJenis").value,
jumlah:Number(document.getElementById("editJumlah").value),
keterangan:document.getElementById("editKet").value

})

tutupEdit()

}

window.hapusData=async function(){

const id=document.getElementById("editId").value

if(confirm("Hapus transaksi?")){

await remove(ref(db,"koperasi/simpanan/"+id))

tutupEdit()

}

}

window.tutupEdit=function(){

document.getElementById("modalEdit").style.display="none"

}

</script>

</body>
</html>
