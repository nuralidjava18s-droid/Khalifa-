<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Koperasi Arfa</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">

<style>
  body{
  margin:0;
  font-family:Arial, sans-serif;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background: linear-gradient(to bottom right, #1e3c72, #2a5298);
  color:white;
}

.card{
  width:90%;
  max-width:360px;
  text-align:center;
  padding:25px 20px;
  border-radius:16px;
  background: rgba(255,255,255,0.1);
  box-shadow: 0 4px 20px rgba(0,0,0,0.2);
}

.card img{
  width:80px;
  margin-bottom:15px;
  border-radius:50%;
}

input{
  width:85%;
  padding:12px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  font-size:14px;
}

button{
  width:95%;
  padding:12px;
  margin-top:15px;
  border:none;
  border-radius:8px;
  font-size:15px;
  font-weight:bold;
  cursor:pointer;
  background: linear-gradient(to right, #00c6ff, #0072ff);
  color:white;
}

button:hover{
  opacity:0.80;
}

.footer{
  position:fixed;
  bottom:15px;
  width:100%;
  text-align:center;
  font-size:12px;
  color:rgba(255,255,255,0.8);
}
  
  

</style>
</head>

<body>

<div class="card">
  <img src="img/icon-192.png">
  <h3>Sistem Koperasi Arfa</h3>

  <input type="text" id="username" placeholder="Username">
  <div style="position:relative;">
  <input type="password" id="password" placeholder="Password">
  <span onclick="togglePassword()" 
        style="position:absolute; right:10px; top:50%; transform:translateY(-50%);
        cursor:pointer; font-size:14px; color:black;">
              👁
  </span>
</div>

  <button onclick="login()">Login</button>
</div>

<script>
const users = {
  admin: {
    password: "ali26",
    role: "admin"
  },
  user: {
    password: "user26",
    role: "user"
  }
};

function login(){
  const usernameInput = document.getElementById("username").value.trim().toLowerCase();
  const passwordInput = document.getElementById("password").value.trim();

  if(users[usernameInput] && users[usernameInput].password === passwordInput){

    localStorage.setItem("role", users[usernameInput].role);
    localStorage.setItem("user", usernameInput);
    localStorage.setItem("sessionCode", passwordInput); // 🔥 INI YANG KURANG

    alert("Login berhasil sebagai " + users[usernameInput].role);
    window.location.href = "dash.html";

  } else {
    alert("Username atau Password salah!");
  }
}

function togglePassword(){
  const passInput = document.getElementById("password");

  if(passInput.type === "password"){
    passInput.type = "text";
  } else {
    passInput.type = "password";
  }
}

<!-- REGISTER SERVICE WORKER -->
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js");
  });
}
</script>

</body>
</html>
