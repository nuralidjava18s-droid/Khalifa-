<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buku Kas Koperasi</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>

<style>
body{font-family:Arial;margin:0;background:#f4f6f9;}
header{background:#1e90ff;color:white;padding:14px;font-weight:bold;text-align:center;}
.container{padding:20px;}
.card{background:white;padding:15px;margin-bottom:15px;border-radius:10px;box-shadow:0 3px 8px rgba(0,0,0,.08);}
input,select{padding:8px;margin-bottom:10px;width:100%;}
table{width:100%;border-collapse:collapse;font-size:8px;margin-top:10px;}
th,td{border:1px solid #ddd;padding:6px;text-align:left;}
th{background:#f1f1f1;}
.total{font-weight:bold;}
button{padding:6px 12px;border:none;border-radius:4px;background:#1e90ff;color:white;cursor:pointer;margin-top:5px;}
</style>
</head>

<body>

  <header>
  <div>Profil Anggota</div>
  <button onclick="window.location='dashboard.html'">Kembali</button>
</header>

<div class="container">

<!-- Bagian Filter & Tombol -->
<div class="card">
  <h3>Filter Periode</h3>
  <input type="month" id="filterBulan">
  <select id="sumberKas">
    <option value="all">Semua</option>
    <option value="cash">Cash</option>
    <option value="bank">Bank</option>
  </select>
  <button onclick="renderBuku()">Tampilkan</button>
  <!-- Tombol Export PDF hanya untuk admin -->
  <button id="btnExport" onclick="exportPDF()">Export PDF</button>
</div>
<div class="card">
<h3>Buku Kas</h3>
<div id="bukuKasContainer"></div>
</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, get } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
authDomain:"arfa-c7dee.firebaseapp.com",
databaseURL:"https://arfa-c7dee-default-rtdb.firebaseio.com",
projectId:"arfa-c7dee"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);
const kasRef=ref(db,"kas");

  // Role check
const role = localStorage.getItem("role"); // role: "admin" atau "user"
if(!role) window.location.href="index.html";

// Hanya admin yang bisa lihat tombol export
if(role !== "admin"){
  document.getElementById("btnExport").style.display = "none";
}

// Logout
window.logout = () => {
  localStorage.clear();
  window.location.href="index.html";
}
function formatRp(n){return Number(n||0).toLocaleString("id-ID");}
function parseTanggal(tgl){return tgl?Number(tgl):0;}

window.renderBuku=async function(){

const filterBulan=document.getElementById("filterBulan").value;
const sumber=document.getElementById("sumberKas").value;

const snap=await get(kasRef);
const container=document.getElementById("bukuKasContainer");
container.innerHTML="";

if(!snap.exists()){ container.innerHTML="Data kosong"; return; }

let data=Object.values(snap.val()).sort((a,b)=>parseTanggal(a.tanggal)-parseTanggal(b.tanggal));

let saldoAwal=0;
let saldoBerjalan=0;
let totalMasuk=0;
let totalKeluar=0;

// Hitung saldo awal bulan
data.forEach(i=>{
const t=new Date(i.tanggal);
const ym=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0");
if(filterBulan && ym < filterBulan){
if(i.tipe==="masuk") saldoAwal+=i.jumlah;
if(i.tipe==="keluar") saldoAwal-=i.jumlah;
}
});

// Filter data sesuai bulan & sumber
data=data.filter(i=>{
const t=new Date(i.tanggal);
const ym=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0");
if(filterBulan && ym !== filterBulan) return false;
if(sumber!=="all" && i.sumberKas!==sumber) return false;
return true;
});

saldoBerjalan=saldoAwal;

// Render tabel
let html=`<table>
<tr>
<th>Tanggal</th><th>Keterangan</th><th>Masuk</th><th>Keluar</th><th>Saldo</th><th>Sumber</th>
</tr>`;

html+=`<tr><td colspan="4"><b>Saldo Awal</b></td><td>${formatRp(saldoAwal)}</td><td>-</td></tr>`;

data.forEach(i=>{
let masuk="", keluar="";
if(i.tipe==="masuk"){ masuk=formatRp(i.jumlah); saldoBerjalan+=i.jumlah; totalMasuk+=i.jumlah; }
if(i.tipe==="keluar"){ keluar=formatRp(i.jumlah); saldoBerjalan-=i.jumlah; totalKeluar+=i.jumlah; }
html+=`<tr>
<td>${new Date(i.tanggal).toLocaleDateString("id-ID")}</td>
<td>${i.keterangan||"-"}</td>
<td>${masuk}</td>
<td>${keluar}</td>
<td>${formatRp(saldoBerjalan)}</td>
<td>${i.sumberKas.toUpperCase()}</td>
</tr>`;
});

html+=`<tr class="total">
<td colspan="2">TOTAL</td>
<td>${formatRp(totalMasuk)}</td>
<td>${formatRp(totalKeluar)}</td>
<td>${formatRp(saldoBerjalan)}</td>
<td>-</td>
</tr>`;

html+="</table>";
container.innerHTML=html;
}

window.exportPDF=async function(){
const filterBulan=document.getElementById("filterBulan").value;
const sumber=document.getElementById("sumberKas").value;
if(!filterBulan){ alert("Pilih bulan dulu"); return; }

const { jsPDF }=window.jspdf;
const doc=new jsPDF();

const snap=await get(kasRef);
if(!snap.exists()){ alert("Data kosong"); return; }

let data=Object.values(snap.val()).sort((a,b)=>parseTanggal(a.tanggal)-parseTanggal(b.tanggal));

let saldoAwal=0;
let saldoBerjalan=0;
let totalMasuk=0;
let totalKeluar=0;

// Saldo awal
data.forEach(i=>{
const t=new Date(i.tanggal);
const ym=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0");
if(ym < filterBulan){ if(i.tipe==="masuk") saldoAwal+=i.jumlah; if(i.tipe==="keluar") saldoAwal-=i.jumlah; }
});

// Filter
data=data.filter(i=>{
const t=new Date(i.tanggal);
const ym=t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0");
if(ym !== filterBulan) return false;
if(sumber!=="all" && i.sumberKas!==sumber) return false;
return true;
});

saldoBerjalan=saldoAwal;

const rows=[];
rows.push(["Saldo Awal","", "", "", formatRp(saldoAwal),""]);

data.forEach(i=>{
let masuk="", keluar="";
if(i.tipe==="masuk"){ masuk=formatRp(i.jumlah); saldoBerjalan+=i.jumlah; totalMasuk+=i.jumlah; }
if(i.tipe==="keluar"){ keluar=formatRp(i.jumlah); saldoBerjalan-=i.jumlah; totalKeluar+=i.jumlah; }
rows.push([new Date(i.tanggal).toLocaleDateString("id-ID"),i.keterangan||"-",masuk,keluar,formatRp(saldoBerjalan),i.sumberKas.toUpperCase()]);
});

// Header PDF
doc.setFontSize(16);
doc.text("BUKU KAS KOPERASI ARFA DRIVER",105,15,{align:"center"});
doc.setFontSize(11);
doc.text("Periode : "+filterBulan,14,25);
doc.text("Tanggal Cetak : "+new Date().toLocaleString("id-ID"),14,32);

doc.autoTable({
head:[["Tanggal","Keterangan","Masuk","Keluar","Saldo","Sumber"]],
body:rows,
startY:40
});

const y=doc.lastAutoTable.finalY + 10;
doc.text("TOTAL MASUK: "+formatRp(totalMasuk),14,y);
doc.text("TOTAL KELUAR: "+formatRp(totalKeluar),14,y+7);
doc.text("SALDO AKHIR: "+formatRp(saldoBerjalan),14,y+14);

doc.save("buku_kas_"+filterBulan+".pdf");
}
</script>

</body>
</html>

<header>
  <div>Profil Anggota</div>
  <button onclick="window.location='dashboard.html'">Kembali</button>
</header>

<div class="container">
  <div class="card">
    <select id="selectAnggota">
      <option value="">-- Pilih Anggota --</option>
    </select>
  </div>

  <div class="card">
    <h3>Simpanan</h3>
    <table id="tabelSimpanan"></table>
  </div>

  <div class="card">
    <h3>Pinjaman</h3>
    <table id="tabelPinjaman"></table>
  </div>

  <div class="card">
    <h3>Angsuran</h3>
    <table id="tabelAngsuran"></table>
  </div>
</div>

<!-- POPUP EDIT -->
<div class="modal" id="modalEdit">
  <div class="modal-content">
    <h3>Edit Data</h3>
    <input type="hidden" id="editPath">
    <input type="hidden" id="editKey">
    <label>Jenis</label>
    <input type="text" id="editJenis">
    <label>Sumber Kas</label>
    <select id="editSumberKas">
      <option value="cash">Cash</option>
      <option value="bank">Bank</option>
    </select>
    <label>Jumlah</label>
    <input type="number" id="editJumlah">
    <label>Tanggal</label>
    <input type="date" id="editTanggal">
    <label>Keterangan</label>
    <input type="text" id="editKeterangan">
    <button id="btnSimpanEdit" onclick="updateData()">Simpan</button>
    <button class="btn-danger" id="btnHapus" onclick="hapusData()">Hapus</button>
    <button onclick="tutupModal()">Tutup</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

// Firebase Config
const firebaseConfig = {
  apiKey:"AIzaSyDd0s73-qW2uiOlBWR-afybFZzMafCHeSo",
  authDomain:"arfa-c7dee.firebaseapp.com",
  databaseURL:"https://arfa-c7dee-default-rtdb.firebaseio.com",
  projectId:"arfa-c7dee"
};
const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// Role user (ambil dari localStorage)
const role = localStorage.getItem("role") || "user";

// Refs
const anggotaRef = ref(db,"anggota");
const simpananRef = ref(db,"simpanan");
const pinjamanRef = ref(db,"pinjaman");
const angsuranRef = ref(db,"angsuran");

let anggotaMap = {};
let dataAll = {simpanan:{}, pinjaman:{}, angsuran:{}};

// Load anggota dropdown
onValue(anggotaRef, snap => {
  anggotaMap = {};
  const select = document.getElementById("selectAnggota");
  select.innerHTML = '<option value="">-- Pilih Anggota --</option>';
  snap.forEach(child => {
    anggotaMap[child.key] = child.val().nama;
    select.innerHTML += `<option value="${child.val().nama}">${child.val().nama}</option>`;
  });
  renderAll();
});

// Load semua data
[simpananRef,pinjamanRef,angsuranRef].forEach((r,idx)=>{
  const type = idx===0?"simpanan":idx===1?"pinjaman":"angsuran";
  onValue(r, snap => {
    dataAll[type] = {};
    snap.forEach(child=>{
      let d = child.val();
      if(d.tanggal && typeof d.tanggal==="string") d.tanggal = Date.parse(d.tanggal.replace(/\./g,":"));
      if(!d.tanggal) d.tanggal = Date.now();
      dataAll[type][child.key] = d;
    });
    renderAll();
  });
});

// Dropdown change
document.getElementById("selectAnggota").addEventListener("change", renderAll);

function renderAll(){
  const namaTerpilih = document.getElementById("selectAnggota").value;
  renderTable("simpanan", namaTerpilih);
  renderTable("pinjaman", namaTerpilih);
  renderTable("angsuran", namaTerpilih);
}

function renderTable(path, namaTerpilih){
  const tableId = path==="simpanan"?"tabelSimpanan":path==="pinjaman"?"tabelPinjaman":"tabelAngsuran";
  const table = document.getElementById(tableId);
  table.innerHTML = "";
  const data = dataAll[path];
  if(!data) return;

  const rows = [];
  Object.entries(data).forEach(([k,v])=>{
    const vNama = v.nama || v.anggota || v.idAnggota || "";
    if(namaTerpilih && vNama !== namaTerpilih) return;
    rows.push({key:k,data:v});
  });

  if(rows.length===0){
    table.innerHTML = "<tr><td colspan='10' style='text-align:center'>Data tidak ditemukan</td></tr>";
    return;
  }

  rows.sort((a,b)=> (b.data.tanggal || 0) - (a.data.tanggal || 0));

  const fields = ["nama","jenis","sumberKas","jumlah","tanggal","keterangan"];
  let html = "<tr>";
  fields.forEach(f=> html+="<th>"+f+"</th>");
  html+="</tr>";

  rows.forEach(r=>{
    html+=`<tr ${role!=="admin"?"":`onclick="editData('${path}','${r.key}')"`}>`;
    fields.forEach(f=>{
      let val = r.data[f];
      if(f==="tanggal" && val) val = new Date(val).toLocaleDateString("id-ID");
      html+=`<td>${val||""}</td>`;
    });
    html+="</tr>";
  });
  table.innerHTML = html;
}

// Popup edit
window.editData = function(path,key){
  if(role!=="admin"){ alert("Hanya admin yang bisa edit"); return; }
  const item = dataAll[path][key];
  if(!item) return;
  document.getElementById("editPath").value = path;
  document.getElementById("editKey").value = key;
  document.getElementById("editJenis").value = item.jenis || "";
  document.getElementById("editSumberKas").value = item.sumberKas || "cash";
  document.getElementById("editJumlah").value = item.jumlah || 0;
  document.getElementById("editTanggal").value = item.tanggal ? new Date(item.tanggal).toISOString().split("T")[0] : "";
  document.getElementById("editKeterangan").value = item.keterangan || "";
  document.getElementById("modalEdit").style.display = "flex";
}

window.tutupModal = ()=>{ document.getElementById("modalEdit").style.display="none"; }

window.updateData = async function(){
  const path = document.getElementById("editPath").value;
  const key = document.getElementById("editKey").value;
  if(!path || !key) return alert("Data tidak ditemukan");

  const jumlahVal = Number(document.getElementById("editJumlah").value);
  if(!jumlahVal || jumlahVal<0) return alert("Jumlah harus lebih dari 0");

  const updated = {
    jenis: document.getElementById("editJenis").value || "",
    sumberKas: document.getElementById("editSumberKas").value,
    jumlah: jumlahVal,
    tanggal: new Date(document.getElementById("editTanggal").value).getTime() || Date.now(),
    keterangan: document.getElementById("editKeterangan").value || ""
  };

  await update(ref(db, path+"/"+key), updated);
  dataAll[path][key] = {...dataAll[path][key], ...updated};
  alert("Data berhasil diperbarui");
  tutupModal();
  renderAll();
}

window.hapusData = async function(){
  const path = document.getElementById("editPath").value;
  const key = document.getElementById("editKey").value;
  if(!path || !key) return alert("Data tidak ditemukan");
  if(confirm("Yakin ingin menghapus data?")){
    await remove(ref(db,path+"/"+key));
    delete dataAll[path][key];
    alert("Data berhasil dihapus");
    tutupModal();
    renderAll();
  }
}
</script>
</body>
</html>
